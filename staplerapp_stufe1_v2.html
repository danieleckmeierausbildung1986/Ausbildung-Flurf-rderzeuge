<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staplerschulung Stufe 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3347;--accent:#f5a623;--accent2:#4fc3f7;--text:#e8eaf0;--muted:#8891aa;--correct:#4caf7d;--wrong:#e05c5c;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:12px;color:var(--muted)}
.header-right{margin-left:auto;display:flex;gap:10px}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.08)}
main{flex:1;display:flex;flex-direction:column}
.view{display:none;flex:1}
.view.active{display:flex;flex-direction:column}
#view-start{align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:36px}
.start-hero h1{font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.1;margin-bottom:12px}
.start-hero h1 span{color:var(--accent)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;width:100%;max-width:900px}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.module-card:hover{border-color:var(--accent2);background:var(--surface2);transform:translateY(-2px)}
.module-card .m-icon{font-size:22px;margin-bottom:10px}
.module-card .m-title{font-size:14px;font-weight:600}
.module-card .m-count{font-size:12px;color:var(--muted);margin-top:4px}
.start-cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn-primary{background:var(--accent);color:#1a1000;border:none;padding:13px 28px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);padding:13px 28px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2)}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:14px;transition:all .2s}
.back-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#view-lernen{padding:24px;gap:20px;max-width:800px;margin:0 auto;width:100%}
.lernen-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lernen-header h2{font-size:20px;font-weight:700}
.progress-wrap{margin-left:auto;display:flex;align-items:center;gap:10px}
.progress-bar-bg{width:160px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.progress-text{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.lern-karte{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.k-titel{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:12px;font-family:'DM Mono',monospace}
.k-inhalt{font-size:15px;line-height:1.7}
.k-inhalt p{margin-bottom:10px}
.lern-bilder{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.lern-bilder img{max-height:180px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:#111;cursor:pointer}
.lern-bilder img:hover{border-color:var(--accent2)}
.lern-nav{display:flex;gap:10px;align-items:center}
.lern-nav .spacer{flex:1}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;cursor:pointer}
#lightbox.active{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
#view-quiz{padding:24px;gap:20px;max-width:750px;margin:0 auto;width:100%}
.quiz-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.quiz-badge{font-family:'DM Mono',monospace;font-size:12px;background:rgba(245,166,35,.1);color:var(--accent);border:1px solid rgba(245,166,35,.3);padding:4px 12px;border-radius:20px}
.quiz-score{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);margin-left:auto}
.frage-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.frage-nr{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;font-family:'DM Mono',monospace}
.frage-text{font-size:18px;font-weight:600;line-height:1.5}
.antworten{display:flex;flex-direction:column;gap:10px}
.antwort-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px 18px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:14px;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:12px}
.antwort-btn:not(.disabled):hover{border-color:var(--accent2);background:rgba(79,195,247,.07)}
.antwort-label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:18px;margin-top:1px}
.antwort-btn.correct{border-color:var(--correct);background:rgba(76,175,125,.12)}
.antwort-btn.correct .antwort-label{color:var(--correct)}
.antwort-btn.wrong{border-color:var(--wrong);background:rgba(224,92,92,.1)}
.antwort-btn.wrong .antwort-label{color:var(--wrong)}
.antwort-btn.disabled{cursor:default;opacity:.6}
.antwort-btn.correct,.antwort-btn.wrong{opacity:1!important}
.feedback-box{background:var(--surface2);border-left:3px solid var(--correct);border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;font-size:14px;line-height:1.6;display:none}
.feedback-box.wrong{border-color:var(--wrong)}
.feedback-box.active{display:block}
.quiz-footer{display:flex;gap:12px;align-items:center}
.quiz-footer .spacer{flex:1}
.ergebnis-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center}
.ergebnis-box h2{font-size:32px;font-weight:700;margin-bottom:10px}
.ergebnis-punkte{font-size:60px;font-family:'DM Mono',monospace;font-weight:500;color:var(--accent);line-height:1;margin:20px 0}
.ergebnis-sub{color:var(--muted);font-size:15px;margin-bottom:30px}
.ergebnis-bar-wrap{max-width:400px;margin:0 auto 30px}
.ergebnis-bar-bg{height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px}
.ergebnis-bar-fill{height:100%;border-radius:6px;transition:width 1s ease}
.ergebnis-hint{font-size:13px;color:var(--muted)}
@media(max-width:600px){header{flex-wrap:wrap;gap:10px}.header-right{width:100%;justify-content:space-between}.module-grid{grid-template-columns:1fr 1fr}.frage-text{font-size:16px}}
</style></head><body>
<header>
  <div><div class="logo">DGUV 308-001</div></div>
  <div><div class="header-title">Staplerschulung Stufe&#160;1</div><div class="header-sub">Theoretisches Lernprogramm</div></div>

<main>

      <span class="progress-text" id="lern-progress-text">0/0</span>
    </div>
  </div>
  <div class="lern-karte">
    <div class="k-titel" id="lern-karte-titel"></div>
    <div class="k-inhalt" id="lern-karte-inhalt"></div>
    <div class="lern-bilder" id="lern-bilder"></div>

</div>

  <div class="ergebnis-box" id="ergebnis-box" style="display:none">

    </div>
    <button class="btn-primary" onclick="startQuiz()" style="margin-right:10px">Nochmal</button>
    <button class="btn-secondary" onclick="showView('start')">Zur &#220;bersicht</button>
  </div>
</div>
</main>

<script>
var FRAGEN=[{"f":"Wer f\u00fchrte in Deutschland die gesetzliche UV-Versicherung ein?","a":["Norbert Bl\u00fcm (Minister f\u00fcr Arbeit 1982-1998)","Otto v. Bismarck (1. Reichskanzler 1871-1890)","Wolfgang Clement (Minister f\u00fcr Wirtschaft und Arbeit 2002 - 2005)"],"r":1},{"f":"Welches Regelwerk gibt detaillierte Anleitungen f\u00fcr die Ausbildung von Staplerfahrern?","a":["UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27).","BG-Grundsatz \u201eAusbildung und Beauftragung der Fahrer von Flurf\u00f6rderzeugen mit Fahrersitz und Fahrerstand\u201c (BGG 925).","DIN-Norm \u201eSicherheit von Flurf\u00f6rderzeugen; Motorkraftbetriebene Flurf\u00f6rderzeuge bis einschlie\u00dflich 10 000 kg Tragf\u00e4higkeit ...\u201c (DIN EN 1726-1)."],"r":1},{"f":"Bei der UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27) handelt es sich um ein Regelwerk\u2026","a":["des Staates.","der Berufsgenossenschaft.","des Betriebes."],"r":1},{"f":"An wen wendet sich die EG-Maschinenrichtlinie?","a":["Mitgliedstaaten der EG.","Hersteller von Maschinen.","Betreiber von Maschinen."],"r":1},{"f":"Was regelt die EG-Maschinenrichtlinie?","a":["Bewegungsrichtungen von Maschinen.","Beschaffenheit von Maschinen.","Toleranzen bei Abweichung einer vorgegebenen Fahrtrichtung einer Maschine."],"r":1},{"f":"Die Schwere der Verletzung einer Vorschrift stuft sich wie folgt ab:","a":["vors\u00e4tzlich, grob fahrl\u00e4ssig, fahrl\u00e4ssig.","fahrl\u00e4ssig, grob fahrl\u00e4ssig, vors\u00e4tzlich.","grob fahrl\u00e4ssig, fahrl\u00e4ssig, vors\u00e4tzlich."],"r":1},{"f":"Wer meldet wem festgestellte M\u00e4ngel an einem Gabelstapler?","a":["Pr\u00fcfer dem Hersteller, damit dieser die Konstruktion \u00e4ndert.","Staplerfahrer dem Unternehmer, um eine Reparatur zu veranlassen.","Unternehmer dem Staplerfahrer, um diesen zu warnen."],"r":1},{"f":"Was regelt die UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27)?","a":["Nur Beschaffenheit von Flurf\u00f6rderzeugen.","Nur Betrieb von Flurf\u00f6rderzeugen.","Betrieb und Beschaffenheit von Flurf\u00f6rderzeugen."],"r":1},{"f":"Was regelt die Betriebssicherheitsverordnung?","a":["Ablegereife von technischen Arbeitsmitteln.","Bereitstellung von Arbeitsmitteln.","Bestellung der Anzahl der Sicherheitsfachkr\u00e4fte."],"r":1},{"f":"An wen wendet sich die Betriebssicherheitsverordnung?","a":["Arbeitnehmer.","Arbeitgeber.","Fachkr\u00e4fte f\u00fcr Arbeitssicherheit."],"r":1},{"f":"Wozu dient das Arbeitsschutzgesetz?","a":["Die Versicherten vor der Arbeit zu sch\u00fctzen.","Die Sicherheit bei der Arbeit zu verbessern.","Die Arbeit vor Rationalisierungsma\u00dfnahmen zu sch\u00fctzen."],"r":1},{"f":"Wem obliegt die Aufgabe, Arbeitsunf\u00e4lle und Berufskrankheiten zu verh\u00fcten?","a":["Der Berufsgenossenschaft","Dem Unternehmer","Den Mitarbeitern"],"r":1},{"f":"Welche Flurf\u00f6rderzeuge erfordern keine qualifizierte Fahrerausbildung?","a":["Regalstapler.","Handbewegter Gabelhubwagen.","Regalbedienger\u00e4t."],"r":1},{"f":"Eine Fahrerr\u00fcckhalteeinrichtung muss angelegt werden, weil...","a":["sie vorhanden ist.","sie Leben retten kann.","ohne sie alle Steuerfunktionen des Gabelstaplers ausgeschaltet sind."],"r":1},{"f":"Ein typisches Bauteil eines Gabelstapler ist ...","a":["das Ersatzrad.","das Lenkrad.","das St\u00fctzrad."],"r":1},{"f":"Was spielt bei Verwendung eines Anbauger\u00e4tes keine Rolle?","a":["Das Gewicht.","Die Farbe.","Der Schwerpunkt."],"r":1},{"f":"Wodurch wird bei einem hydrodynamischen Antrieb die Antriebskraft auf die R\u00e4der \u00fcbertragen?","a":["Durch eine mechanische Welle.","Durch \u00d6l.","Durch Strom."],"r":1},{"f":"\u00dcber was wird beim Gabelstapler gelenkt?","a":["Vorderachse.","Hinterachse.","Mittelachse."],"r":1},{"f":"Fahrerr\u00fcckhalteeinrichtungen dienen dazu, ...","a":["den Fahrer vor Eingriff in das Hubger\u00fcst zu sch\u00fctzen.","das Risiko beim Kippen des Staplers zu begrenzen.","das Verletzungsrisiko beim Zusammensto\u00df zweier Stapler zu begrenzen."],"r":1},{"f":"Dient die Fa
