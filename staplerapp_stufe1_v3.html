<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staplerschulung Stufe 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3347;--accent:#f5a623;--accent2:#4fc3f7;--text:#e8eaf0;--muted:#8891aa;--correct:#4caf7d;--wrong:#e05c5c;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:12px;color:var(--muted)}
.header-right{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.08)}
main{flex:1;display:flex;flex-direction:column}
.view{display:none;flex:1}
.view.active{display:flex;flex-direction:column}
#view-start{align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:32px}
.start-hero h1{font-size:clamp(26px,5vw,46px);font-weight:700;line-height:1.1;margin-bottom:10px}
.start-hero h1 span{color:var(--accent)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;width:100%;max-width:900px}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;text-align:left}
.module-card:hover{border-color:var(--accent2);background:var(--surface2);transform:translateY(-2px)}
.module-card .m-icon{font-size:24px;margin-bottom:8px}
.module-card .m-title{font-size:13px;font-weight:600}
.module-card .m-count{font-size:12px;color:var(--muted);margin-top:3px}
.start-cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-primary{background:var(--accent);color:#1a1000;border:none;padding:12px 26px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);padding:12px 26px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2)}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s}
.back-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#view-lernen{padding:20px;gap:16px;max-width:820px;margin:0 auto;width:100%}
.lernen-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lernen-header h2{font-size:18px;font-weight:700}
.progress-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
.progress-bar-bg{width:140px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.progress-text{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.lern-karte{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.lern-karte-header{padding:20px 20px 0}
.k-modul{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px;font-family:'DM Mono',monospace}
.k-titel{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:16px}
.lern-karte-body{display:flex;gap:0}
.k-text{flex:1;padding:0 20px 20px}
.k-text p{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:10px;padding-left:14px;border-left:2px solid var(--border)}
.k-text p:first-child{border-left-color:var(--accent);font-weight:500;padding-left:12px}
.k-bild{flex:0 0 220px;border-left:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;padding:16px;border-radius:0 var(--radius) var(--radius) 0}
.k-bild img{max-width:100%;max-height:200px;object-fit:contain;border-radius:6px;cursor:pointer}
.k-bild img:hover{opacity:.85}
.lern-nav{display:flex;gap:10px;align-items:center}
.lern-nav .spacer{flex:1}
.lern-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.lern-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.lern-dot.active{background:var(--accent);transform:scale(1.2)}
.lern-dot.done{background:var(--muted)}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;cursor:pointer}
#lightbox.active{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
#view-quiz{padding:20px;gap:16px;max-width:740px;margin:0 auto;width:100%}
.quiz-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.quiz-badge{font-family:'DM Mono',monospace;font-size:11px;background:rgba(245,166,35,.1);color:var(--accent);border:1px solid rgba(245,166,35,.3);padding:4px 10px;border-radius:20px}
.quiz-score{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}
.frage-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.frage-nr{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace}
.frage-text{font-size:17px;font-weight:600;line-height:1.5}
.antworten{display:flex;flex-direction:column;gap:9px}
.antwort-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:14px;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:11px}
.antwort-btn:not(.disabled):hover{border-color:var(--accent2);background:rgba(79,195,247,.07)}
.antwort-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:16px;margin-top:2px;flex-shrink:0}
.antwort-btn.correct{border-color:var(--correct);background:rgba(76,175,125,.12)}
.antwort-btn.correct .antwort-label{color:var(--correct)}
.antwort-btn.wrong{border-color:var(--wrong);background:rgba(224,92,92,.1)}
.antwort-btn.wrong .antwort-label{color:var(--wrong)}
.antwort-btn.disabled{cursor:default;opacity:.6}
.antwort-btn.correct,.antwort-btn.wrong{opacity:1!important}
.feedback-box{background:var(--surface2);border-left:3px solid var(--correct);border-radius:0 var(--radius) var(--radius) 0;padding:12px 16px;font-size:13px;line-height:1.6;display:none}
.feedback-box.wrong{border-color:var(--wrong)}
.feedback-box.active{display:block}
.quiz-footer{display:flex;gap:10px;align-items:center}
.quiz-footer .spacer{flex:1}
.ergebnis-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;text-align:center}
.ergebnis-box h2{font-size:28px;font-weight:700;margin-bottom:8px}
.ergebnis-punkte{font-size:56px;font-family:'DM Mono',monospace;font-weight:500;color:var(--accent);line-height:1;margin:16px 0}
.ergebnis-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.ergebnis-bar-wrap{max-width:380px;margin:0 auto 24px}
.ergebnis-bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:6px}
.ergebnis-bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
.ergebnis-hint{font-size:12px;color:var(--muted)}
@media(max-width:600px){.module-grid{grid-template-columns:1fr 1fr}.k-bild{display:none}.frage-text{font-size:15px}}
</style></head><body>
<header>
  <div><div class="logo">DGUV 308-001</div></div>
  <div><div class="header-title">Staplerschulung Stufe&#160;1</div><div class="header-sub">Theoretisches Lernprogramm</div></div>

</header>
<main>

    <button class="btn-primary" onclick="startQuiz(20)">&#127919; Quiz starten (20 Fragen)</button>
    <button class="btn-secondary" onclick="startQuiz(186)">Alle 186 Fragen</button>
  </div>
</div>
<div id="view-lernen" class="view">

    <button class="back-btn" onclick="showView('start')">&#8592; Zur&#252;ck</button>
    <h2 id="lernen-modul-titel">Modul</h2>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="lern-progress-bar" style="width:0%"></div></div>
      <span class="progress-text" id="lern-progress-text">0/0</span>
    </div>

  <div class="lern-karte" id="lern-karte">

      <div class="k-modul" id="k-modul"></div>

    </div>
  </div>
  <div class="lern-dots" id="lern-dots"></div>
  <div class="lern-nav">
    <button class="back-btn" onclick="lernPrev()">&#8592; Zur&#252;ck</button>

    <button class="btn-primary" onclick="lernNext()" id="lern-weiter-btn">Weiter &#8594;</button>
  </div>
</div>
<div id="view-quiz" class="view">
  <div class="quiz-meta">
    <span class="quiz-badge" id="quiz-badge">Quiz</span>
    <button class="back-btn" onclick="showView('start')">&#8592; Abbrechen</button>
    <span class="quiz-score" id="quiz-score">0 / 0</span>
  </div>
  <div class="frage-box" id="frage-box">

    <div class="frage-text" id="frage-text"></div>
  </div>
  <div class="antworten" id="antworten"></div>
  <div class="feedback-box" id="feedback"></div>
  <div class="quiz-footer">
    <button class="back-btn" onclick="showView('start')">Beenden</button>
    <span class="spacer"></span>
    <button class="btn-primary" id="weiter-btn" onclick="naechste()" style="display:none">Weiter &#8594;</button>
  </div>
  <div class="ergebnis-box" id="ergebnis" style="display:none">
    <h2>Ergebnis</h2>
    <div class="ergebnis-punkte" id="erg-pkt">-</div>
    <div class="ergebnis-sub" id="erg-sub"></div>
    <div class="ergebnis-bar-wrap"><div class="ergebnis-bar-bg"><div class="ergebnis-bar-fill" id="erg-bar" style="width:0%"></div></div><div class="ergebnis-hint" id="erg-hint"></div></div>
    <button class="btn-primary" onclick="startQuiz(letzteAnzahl)" style="margin-right:10px">Nochmal</button>
    <button class="btn-secondary" onclick="showView('start')">Zur &#220;bersicht</button>
  </div>
</div>
</main>

<script>
var FRAGEN=[{"f":"Wer f\u00fchrte in Deutschland die gesetzliche UV-Versicherung ein?","a":["Norbert Bl\u00fcm (Minister f\u00fcr Arbeit 1982-1998)","Otto v. Bismarck (1. Reichskanzler 1871-1890)","Wolfgang Clement (Minister f\u00fcr Wirtschaft und Arbeit 2002 - 2005)"],"r":1},{"f":"Welches Regelwerk gibt detaillierte Anleitungen f\u00fcr die Ausbildung von Staplerfahrern?","a":["UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27).","BG-Grundsatz \u201eAusbildung und Beauftragung der Fahrer von Flurf\u00f6rderzeugen mit Fahrersitz und Fahrerstand\u201c (BGG 925).","DIN-Norm \u201eSicherheit von Flurf\u00f6rderzeugen; Motorkraftbetriebene Flurf\u00f6rderzeuge bis einschlie\u00dflich 10 000 kg Tragf\u00e4higkeit ...\u201c (DIN EN 1726-1)."],"r":1},{"f":"Bei der UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27) handelt es sich um ein Regelwerk\u2026","a":["des Staates.","der Berufsgenossenschaft.","des Betriebes."],"r":1},{"f":"An wen wendet sich die EG-Maschinenrichtlinie?","a":["Mitgliedstaaten der EG.","Hersteller von Maschinen.","Betreiber von Maschinen."],"r":1},{"f":"Was regelt die EG-Maschinenrichtlinie?","a":["Bewegungsrichtungen von Maschinen.","Beschaffenheit von Maschinen.","Toleranzen bei Abweichung einer vorgegebenen Fahrtrichtung einer Maschine."],"r":1},{"f":"Die Schwere der Verletzung einer Vorschrift stuft sich wie folgt ab:","a":["vors\u00e4tzlich, grob fahrl\u00e4ssig, fahrl\u00e4ssig.","fahrl\u00e4ssig, grob fahrl\u00e4ssig, vors\u00e4tzlich.","grob fahrl\u00e4ssig, fahrl\u00e4ssig, vors\u00e4tzlich."],"r":1},{"f":"Wer meldet wem festgestellte M\u00e4ngel an einem Gabelstapler?","a":["Pr\u00fcfer dem Hersteller, damit dieser die Konstruktion \u00e4ndert.","Staplerfahrer dem Unternehmer, um eine Reparatur zu veranlassen.","Unternehmer dem Staplerfahrer, um diesen zu warnen."],"r":1},{"f":"Was regelt die UVV \u201eFlurf\u00f6rderzeuge\u201c (BGV D27)?","a":["Nur Beschaffenheit von Flurf\u00f6rderzeugen.","Nur Betrieb von Flurf\u00f6rderzeugen.","Betrieb und Beschaffenheit von Flurf\u00f6rderzeugen."],"r":1},{"f":"Was regelt die Betriebssicherheitsverordnung?","a":["Ablegereife von technischen Arbeitsmitteln.","Bereitstellung von Arbeitsmitteln.","Bestellung der Anzahl der Sicherheitsfachkr\u00e4fte."],"r":1},{"f":"An wen wendet sich die Betriebssicherheitsverordnung?","a":["Arbeitnehmer.","Arbeitgeber.","Fachkr\u00e4fte f\u00fcr Arbeitssicherheit."],"r":1},{"f":"Wozu dient das Arbeitsschutzgesetz?","a":["Die Versicherten vor der Arbeit zu sch\u00fctzen.","Die Sicherheit bei der Arbeit zu verbessern.","Die Arbeit vor Rationalisierungsma\u00dfnahmen zu sch\u00fctzen."],"r":1},{"f":"Wem obliegt die Aufgabe, Arbeitsunf\u00e4lle und Berufskrankheiten zu verh\u00fcten?","a":["Der Berufsgenossenschaft","Dem Unternehmer","Den Mitarbeitern"],"r":1},{"f":"Welche Flurf\u00f6rderzeuge erfordern keine qualifizierte Fahrerausbildung?","a":["Regalstapler.","Handbewegter Gabelhubwagen.","Regalbedienger\u00e4t."],"r":1},{"f":"Eine Fahrerr\u00fcckhalteeinrichtung muss angelegt werden, weil...","a":["sie vorhanden ist.","sie Leben retten kann.","ohne sie alle Steuerfunktionen des Gabelstaplers ausgeschaltet sind."],"r":1},{"f":"Ein typisches Bauteil eines Gabelstapler ist ...","a":["das Ersatzrad.","das Lenkrad.","das St\u00fctzrad."],"r":1},{"f":"Was spielt bei Verwendung eines Anbauger\u00e4tes keine Rolle?","a":["Das Gewicht.","Die Farbe.","Der Schwerpunkt."],"r":1},{"f":"Wodurch wird bei einem hydrodynamischen Antrieb die Antriebskraft auf die R\u00e4der \u00fcbertragen?","a":["Durch eine mechanische Welle.","Durch \u00d6l.","Durch Strom."],"r":1},{"f":"\u00dcber was wird beim Gabelstapler gelenkt?","a":["Vorderachse.","Hinterachse.","Mittelachse."],"r":1},{"f":"Fahrerr\u00fcckhalteeinrichtungen dienen dazu, ...","a":["den Fahrer vor Eingriff in das Hubger\u00fcst zu sch\u00fctzen.","das Risiko beim Kippen des Staplers zu begrenzen.","das Verletzungsrisiko beim Zusammensto\u00df zweier Stapler zu begrenzen."],"r":1},{"f":"Dient die Fa hre"],"r":1},{"f":"In wie viel Stufen gliedert sich die Gabelstaplerfahrerausbildung?","a":["1 Stufe","3 Stufen","6 Stufen"],"r":1},{"f":"Die Stufe \"Betriebliche Ausbildung\" gliedert sich in ...","a":["theoretischen und praktischen Teil.","ger\u00e4tebezogenen und verhaltensbezogenen Teil.","Allgemeine Ausbildung und Zusatzausbildung."],"r":1},{"f":"Was wird im praktischen Teil der Stufe \"Allgemeine Ausbildung\" gelehrt?","a":["Sicherheitsbestimmungen und Ger\u00e4tetechnik.","Aufnehmen und Stapeln von Lasten.","Handhabung besonderer Anbauger\u00e4te."],"r":1},{"f":"Welche Flurf\u00f6rderzeuge erfordern statt einer Ausbildung nur eine Unterweisung?","a":["Hochstapler.","Mitg\u00e4ngerflurf\u00f6rderzeuge.","Flurf\u00f6rderzeuge mit Fahrerstand."],"r":1},{"f":"Welche Stapler erfordern eine qualifizierte Fahrerausbildung?","a":["Tiefstapler","Querstapler","Hochstapler"],"r":1},{"f":"\u00dcber welche pers\u00f6nliche Schutzausr\u00fcstung sollte der Staplerfahrer verf\u00fcgen?","a":["Sonnenbrille","Schutzschuhe","Knieschutz"],"r":1},{"f":"Was z\u00e4hlt nicht zu den charakterlichen Eignungen \u00fcber die ein Staplerfahrer verf\u00fcgen sollte?","a":["F\u00e4higkeit Signale zu erkennen, umzusetzen und anzuwenden.","H\u00f6flichkeit und Freundlichkeit gegen\u00fcber den Kollegen","Zuverl\u00e4ssigkeit und Verantwortungsbewu\u00dftsein."],"r":1},{"f":"Was ist zu tun, wenn an der k\u00f6rperlichen Voraussetzung Zweifel bestehen?","a":["Durchf\u00fchrung einer Di\u00e4tma\u00dfnahme.","Durchf\u00fchrung einer arbeitsmedizinischen Untersuchung.","Besuch eines Fitnessstudios."],"r":1},{"f":"\u00dcber welche Voraussetzung muss der Gabelstapler verf\u00fcgen?","a":["Abgeschlossene Berufsausbildung.","Alter mindestens 18 Jahre.","Verheiratet."],"r":1},{"f":"Womit befasst sich der ger\u00e4tebezogene Teil der Ausbildungsstufe \u201eBetriebliche Ausbildung\u201c?","a":["Gebrauch \u00fcblicher Anbauger\u00e4te.","Ausbildung in der Handhabung der Stapler, die der Fahrer im Betrieb fahren soll.","Unterrichtung \u00fcber die Bedeutung der Betriebsanweisung."],"r":1},{"f":"Flurf\u00f6rderzeuge sind gekennzeichnet dadurch, dass sie \u2026","a":["mit R\u00e4dern auf Schienen laufen.","mit R\u00e4dern auf Flur laufen und frei lenkbar sind.","mit R\u00e4dern auf Tragseilen laufen."],"r":1},{"f":"Welche der genannten Ger\u00e4te sind Flurf\u00f6rderzeuge?","a":["Teleskopkran","Teleskopstapler","Teleskoparbeitsb\u00fchne"],"r":1},{"f":"Welche der genannten Ger\u00e4te sind Flurf\u00f6rderzeuge?","a":["Regalbedienger\u00e4t","Regalstapler","Regalbedienkran"],"r":1}];
var MODULE={"Rechtliche Grundlagen":[{"titel":"Warum gibt es Arbeitsschutzgesetze?","inhalt":["Der Schutz von Menschen bei der Arbeit ist ein grundlegendes Ziel unserer Gesellschaft. Im Grundgesetz ist die k\u00f6rperliche Unversehrtheit als sch\u00fctzenswertes Gut verankert \u2013 daraus leitet sich das gesamte Arbeitsschutzrecht ab.","Historisch gesehen entstanden die ersten Schutzgesetze im 19. Jahrhundert: Otto von Bismarck f\u00fchrte 1884 die gesetzliche Unfallversicherung ein. Seitdem wurde das Regelwerk kontinuierlich ausgebaut und verfeinert.","Heute sch\u00fctzt ein mehrstufiges Regelwerk Arbeitnehmer vor Unf\u00e4llen, Berufskrankheiten und gesundheitlichen Sch\u00e4den."]},{"titel":"Das Regelwerk im \u00dcberblick","inhalt":["Das Arbeitsschutzrecht ist hierarchisch aufgebaut \u2013 von allgemeinen Gesetzen bis zu konkreten betrieblichen Vorschriften:","Gesetze (z.B. Arbeitsschutzgesetz, Arbeitssicherheitsgesetz) \u2013 vom Bundestag beschlossen, geben zentrale Eckwerte vor.","Verordnungen (z.B. Betriebssicherheitsverordnung, BetrSichV) \u2013 konkretisieren die Gesetze, regeln Anforderungen an Arbeitsmittel.","DGUV Vorschriften \u2013 Unfallverh\u00fctungsvorschriften der Berufsgenossenschaften, z.B. DGUV Vorschrift 68 'Flurf\u00f6rderzeuge'.","DGUV Grunds\u00e4tze und Regeln \u2013 technische Anleitungen, z.B. DGUV Grundsatz 308-001 zur Ausbildung von Staplerfahrern.","Normen (DIN/EN/ISO) \u2013 technische Standards, nicht staatlich bindend, aber anerkannte Regeln der Technik."]},{"titel":"Pflichten des Unternehmers","inhalt":["Der Unternehmer (Arbeitgeber) tr\u00e4gt die Hauptverantwortung f\u00fcr Sicherheit und Gesundheitsschutz im Betrieb. Seine zentralen Pflichten:","Nur geeignete, unterwiesene und beauftragte Personen d\u00fcrfen Flurf\u00f6rderzeuge f\u00fchren (\u00a7 4 DGUV Vorschrift 68).","Er muss eine Gef\u00e4hrdungsbeurteilung durchf\u00fchren und geeignete Schutzma\u00dfnahmen festlegen.","Er hat sicherzustellen dass Flurf\u00f6rderzeuge regelm\u00e4\u00dfig durch eine bef\u00e4higte Person gepr\u00fcft werden.","Er muss Betriebsanweisungen erstellen und aush\u00e4ngen.","M\u00e4ngel die vom Fahrer gemeldet werden m\u00fcssen unverz\u00fcglich beseitigt werden."]},{"titel":"Pflichten des Staplerfahrers","inhalt":["Auch der Staplerfahrer tr\u00e4gt Verantwortung \u2013 er ist zur Einhaltung aller Sicherheitsvorschriften verpflichtet:","Nur mit g\u00fcltigem Fahrauftrag des Unternehmers darf ein Flurf\u00f6rderzeug gef\u00fchrt werden.","Vor jeder Schicht: Sichtpr\u00fcfung des Fahrzeugs auf offensichtliche M\u00e4ngel.","Festgestellte M\u00e4ngel sofort dem Vorgesetzten melden \u2013 bei sicherheitsrelevanten M\u00e4ngeln Fahrzeug stilllegen.","Keine Personen auf Gabelzinken oder Lasttr\u00e4gern bef\u00f6rdern.","Alle betrieblichen Anweisungen und Verkehrsregeln einhalten."]},{"titel":"Konsequenzen bei Pflichtverletzungen","inhalt":["Wer gegen Vorschriften verst\u00f6\u00dft und dadurch Sch\u00e4den verursacht, muss mit rechtlichen Konsequenzen rechnen. Die Schwere richtet sich nach der Art der Pflichtverletzung:","Fahrl\u00e4ssigkeit ('Ich habe nicht daran gedacht') \u2013 geringste Stufe, trotzdem strafbar bei Schaden.","Grobe Fahrl\u00e4ssigkeit ('Ich habe darauf vertraut, dass nichts passiert') \u2013 schwerwiegender, h\u00f6here Strafen.","Vorsatz ('Ich wollte das so') \u2013 h\u00f6chste Stufe, strafrechtlich relevant.","Folgen k\u00f6nnen sein: Bu\u00dfgelder, Regressforderungen der Berufsgenossenschaft, zivilrechtliche Haftung, im schlimmsten Fall Freiheitsstrafe."]}],"Antriebsarten":[{"titel":"\u00dcbersicht der Antriebsarten","inhalt":["Gabelstapler werden heute mit verschiedenen Antriebsarten betrieben \u2013 die Wahl h\u00e4ngt vom Einsatzort, den Lastanforderungen und den Umweltbedingungen ab.","Die wichtigsten Antriebsarten sind: Verbrennungsmotor (Diesel, Treibgas/LPG), Elektroantrieb (Batterie) und Wasserstoff-Brennstoffzelle (zunehmend im Einsatz).","Jede Antriebsart hat spezifische Vor- und Nachteile sowie besondere Sicherheitsanforderungen."]},{"titel":"Dieselstapler","inhalt":["Dieselstapler sind f\u00fcr den Einsatz im Freien und in gut bel\u00fcfteten Hallen geeignet. Merkmale:","Hohe Traglasten m\u00f6glich, robust und langlebig.","Abgase (CO, NOx, Partikel) \u2013 daher nicht f\u00fcr geschlossene Innenr\u00e4ume ohne ausreichende Bel\u00fcftung geeignet.","Regelm\u00e4\u00dfige Wartung: \u00d6lwechsel, Filterwechsel, Abgasuntersuchung.","Kraftstoff: Dieselkraftstoff, Betankung nur an daf\u00fcr vorgesehenen Stellen, Brandschutz beachten.","Motor abstellen beim Betanken, nicht in der N\u00e4he von Z\u00fcndquellen betanken."]},{"titel":"Treibgasstapler (LPG)","inhalt":["Treibgasstapler (Fl\u00fcssiggas/Propan) werden sowohl im Innen- als auch im Au\u00dfenbereich eingesetzt.","Geringere Schadstoffemissionen als Diesel \u2013 eingeschr\u00e4nkt in Innenr\u00e4umen nutzbar, aber nur bei ausreichender Bel\u00fcftung.","Gasflaschenwechsel: Nur von unterwiesenen Personen, Schutzhandschuhe tragen, keine offenen Flammen in der N\u00e4he.","Gasflasche auf Dichtheit pr\u00fcfen (Seifenwasser), nie in Kellerr\u00e4umen lagern (Gas ist schwerer als Luft).","Bei Gasgeruch: Fahrzeug sofort abstellen, Bereich verlassen, Vorgesetzten informieren."]},{"titel":"Elektrostapler","inhalt":["Elektrostapler sind emissionsfrei am Einsatzort \u2013 ideal f\u00fcr Lebensmittelbetriebe, K\u00fchlh\u00e4user und geschlossene Hallen.","Antrieb \u00fcber Traktionsbatterie (Blei-S\u00e4ure oder Lithium-Ionen).","Laden der Batterie: Nur an vorgesehenen Ladestationen, ausreichende Bel\u00fcftung wegen Wasserstoffentwicklung bei Blei-Batterien.","Batteriewechsel: Nur von unterwiesenen Personen, Augenschutz und s\u00e4urefeste Handschuhe tragen.","Keine offenen Flammen in der N\u00e4he von Ladevorg\u00e4ngen \u2013 Explosionsgefahr durch Wasserstoff.","Lithium-Ionen-Batterien: Keine Tiefentladung, bei Besch\u00e4digung Brandgefahr \u2013 Betriebsanweisung beachten."]},{"titel":"Besonderheiten beim Betanken und Laden","inhalt":["Unabh\u00e4ngig von der Antriebsart gelten beim Betanken und Laden besondere Sicherheitsregeln:","Motor bzw. Fahrzeug immer abschalten vor dem Betanken/Laden.","Vorgeschriebene Schutzausr\u00fcstung tragen (Handschuhe, ggf. Schutzbrille).","Keine Z\u00fcndquellen in der N\u00e4he (Rauchen verboten, keine offenen Flammen).","Versch\u00fctteten Kraftstoff oder S\u00e4ure sofort beseitigen und Vorgesetzten informieren.","Betankungseinrichtungen und Ladestationen regelm\u00e4\u00dfig pr\u00fcfen lassen."]}],"Aufbau und Funktion":[{"titel":"Baugruppen des Gabelstaplers","inhalt":["Ein Gabelstapler besteht aus mehreren wesentlichen Baugruppen, die zusammenwirken:","Fahrwerk mit Antriebsachse (vorne, angetrieben) und Lenkachse (hinten, gelenkt) \u2013 beim Gegengewichtsstapler.","Hubger\u00fcst (Mast) mit Hubzylinder und Gabeltr\u00e4ger.","Lastaufnahmemittel (i.d.R. Gabelzinken), tauschbar gegen Anbauger\u00e4te.","Gegengewicht hinten \u2013 gleicht das Lastmoment aus und verhindert Kippen.","Fahrerkabine mit allen Bedien- und Anzeigeelementen.","Antriebsaggregat (Motor oder Batterie) meist unter oder hinter dem Fahrersitz."]},{"titel":"Das Hubger\u00fcst","inhalt":["Das Hubger\u00fcst (Mast) ist das zentrale Arbeitswerkzeug des Staplers. Es gibt verschiedene Bauformen:","Simplexmast (einstufig): Einfachster Aufbau, begrenzte Hubh\u00f6he, gute Sicht.","Duplexmast (zweistufig): Freihub m\u00f6glich \u2013 der Gabeltr\u00e4ger kann angehoben werden ohne den Mast zu strecken. Ideal f\u00fcr niedrige Durchfahrten.","Triplexmast (dreistufig): Maximale Hubh\u00f6he bei kompakter Einbautiefe.","Wichtig: Der Mast wird beim Fahren immer zur\u00fcckgeneigt (R\u00fcckneigung) \u2013 das sichert die Last und verbessert die Standsicherheit.","Vorneigung nur beim Aufnehmen und Absetzen von Lasten."]},{"titel":"Gabelzinken und Anbauger\u00e4te","inhalt":["Gabelzinken sind das Standardlastaufnahmemittel. Sie m\u00fcssen regelm\u00e4\u00dfig auf Verschlei\u00df und Risse gepr\u00fcft werden.","Gabelzinken d\u00fcrfen nur paarweise verwendet werden und m\u00fcssen gleich lang und gleich stark sein.","Anbauger\u00e4te erweitern den Einsatzbereich erheblich: Seitenschieber, Klammern, Rotator, Mehrfachpalettengabel u.v.m.","Wichtig: Jedes Anbauger\u00e4t reduziert die zul\u00e4ssige Traglast \u2013 das ge\u00e4nderte Traglastdiagramm muss am Fahrzeug angebracht sein.","Anbauger\u00e4te d\u00fcrfen nur eingesetzt werden wenn der Fahrer eingewiesen wurde."]},{"titel":"Bedien- und Anzeigeelemente","inhalt":["Vor der ersten Fahrt muss der Fahrer alle Bedienelemente kennen:","Lenkrad, Fahrpedal, Bremspedal, Feststellbremse.","Hubhebel (heben/senken), Neigungshebel (vor/zur\u00fcck neigen), ggf. weitere Hebel f\u00fcr Anbauger\u00e4te.","Anzeigeinstrumente: Betriebsstundenz\u00e4hler, Kraftstoff-/Ladeanzeige, Temperaturanzeige, Warnsignalleuchten.","Hupe, Beleuchtung, Warnblinkanlage.","Der Fahrer muss alle Warnleuchten kennen und wissen was bei deren Aufleuchten zu tun ist."]},{"titel":"Traglastdiagramm","inhalt":["Das Traglastdiagramm ist am Fahrzeug angebracht und zeigt die maximal zul\u00e4ssige Traglast in Abh\u00e4ngigkeit von Lastschwerpunktabstand und Hubh\u00f6he.","Mit steigendem Lastschwerpunktabstand sinkt die zul\u00e4ssige Traglast.","Mit steigender Hubh\u00f6he sinkt die zul\u00e4ssige Traglast.","Das Diagramm gilt f\u00fcr den Standardmast ohne Anbauger\u00e4te. Mit Anbauger\u00e4ten gilt ein ge\u00e4ndertes Diagramm.","Die Angaben im Traglastdiagramm d\u00fcrfen niemals \u00fcberschritten werden \u2013 \u00dcberlastung f\u00fchrt zu Kippen oder Bauteilversagen."]}],"Standsicherheit":[{"titel":"Das Kippdreieck","inhalt":["Die Standsicherheit eines Gabelstaplers wird durch das sogenannte Kippdreieck bestimmt. Es wird gebildet durch die Verbindungslinien zwischen den Aufstandspunkten der R\u00e4der:","Beim Gegengewichtsstapler: Vorderachse (Antriebsachse) und der Drehpunkt der Hinterachse bilden die drei Eckpunkte.","Solange der Gesamtschwerpunkt (Fahrzeug + Last) innerhalb des Kippdreiecks liegt, ist der Stapler standsicher.","Verlagert sich der Schwerpunkt \u00fcber eine Kippkante, kippt das Fahrzeug.","Deshalb: Nie zu schnell in Kurven, keine abrupten Bewegungen, Last immer korrekt aufnehmen."]},{"titel":"Beladener vs. unbeladener Stapler","inhalt":["Entgegen der Intuition ist der unbeladene Stapler kippgef\u00e4hrdeter als der beladene \u2013 seitlich gesehen.","Grund: Beim unbeladenen Stapler liegt der Schwerpunkt h\u00f6her (das schwere Gegengewicht ist weit hinten und oben).","Beim beladenen Stapler zieht die Last den Schwerpunkt nach vorne und unten \u2013 das stabilisiert das Fahrzeug seitlich.","L\u00e4ngs gesehen (nach vorne) ist der beladene Stapler gef\u00e4hrdeter \u2013 die Last kann den Stapler nach vorne kippen lassen.","Daher: Immer mit zur\u00fcckgeneigtem Mast und abgesenkten Gabeln fahren."]},{"titel":"Einflussfaktoren auf die Standsicherheit","inhalt":["Viele Faktoren beeinflussen die Standsicherheit \u2013 der Fahrer muss sie alle kennen und ber\u00fccksichtigen:","Fahrgeschwindigkeit: Bei Kurvenfahrt wirkt Fliehkraft \u2013 bei doppelter Geschwindigkeit viermal so gro\u00df.","Untergrund: Unebenheiten, Neigungen, nasse oder \u00f6lige B\u00f6den reduzieren die Standsicherheit erheblich.","Hubh\u00f6he: Je h\u00f6her die Last angehoben wird, desto instabiler wird das System.","Lastschwerpunkt: Dezentrierte oder h\u00e4ngende Lasten verschieben den Schwerpunkt ung\u00fcnstig.","Reifenzustand: Platte oder stark abgenutzte Reifen verringern die Standsicherheit."]},{"titel":"Verhalten auf Schr\u00e4gen und Rampen","inhalt":["Rampen und Schr\u00e4gen stellen besondere Anforderungen an den Fahrer:","Rampen immer l\u00e4ngs (in Fahrtrichtung) befahren \u2013 nie quer zur Neigung.","Beladener Stapler: Last immer bergseitig (Last zeigt nach oben die Rampe).","Unbeladener Stapler: Gabelseite bergw\u00e4rts.","Niemals auf einer Schr\u00e4ge wenden oder querstehen \u2013 Kippgefahr.","Geschwindigkeit auf Rampen deutlich reduzieren.","Keine Lasten auf Rampen aufnehmen oder absetzen."]},{"titel":"Ma\u00dfnahmen zur Erh\u00f6hung der Standsicherheit","inhalt":["Folgende Verhaltensregeln erh\u00f6hen die Standsicherheit im t\u00e4glichen Betrieb:","Immer mit abgesenkten Gabeln (Bodenfreiheit ca. 15\u201320 cm) und zur\u00fcckgeneigtem Mast fahren.","Geschwindigkeit der Situation anpassen \u2013 besonders in Kurven, auf Rampen und bei unebenem Untergrund.","Last gleichm\u00e4\u00dfig auf beide Gabelzinken verteilen, Schwerpunkt so nah wie m\u00f6glich am Gabelr\u00fccken.","Keine abrupten Lenk-, Brems- oder Beschleunigungsman\u00f6ver.","Traglastdiagramm beachten \u2013 keine \u00dcberlastung."]}],"Umgang mit Last":[{"titel":"Aufnehmen von Paletten","inhalt":["Das korrekte Aufnehmen von Lasten ist grundlegend f\u00fcr sicheres Arbeiten:","Gabeln auf die richtige Breite einstellen \u2013 so weit wie m\u00f6glich auseinander, passend zur Palette.","Stapler gerade vor die Palette fahren, Gabeln waagerecht (keine Vorneigung beim Anfahren).","Gabeln vollst\u00e4ndig in die Paletten\u00f6ffnungen einfahren \u2013 Gabeln m\u00fcssen auf beiden Seiten herausschauen.","Last leicht anheben (ca. 15\u201320 cm), Mast zur\u00fcckneigen, dann absenken auf Fahrh\u00f6he.","Nie mit vorw\u00e4rts geneigtem Mast fahren \u2013 Kippgefahr und Last kann verrutschen."]},{"titel":"Absetzen von Lasten","inhalt":["Auch beim Absetzen gibt es wichtige Regeln:","Langsam und kontrolliert an die Absetzstelle heranfahren.","Mast senkrecht stellen (keine Neigung), Last genau positionieren.","Last absenken bis sie vollst\u00e4ndig auf dem Untergrund oder Regal aufliegt.","Mast leicht vorneigen, Gabeln herausziehen.","Pr\u00fcfen ob die Last sicher steht bevor der Bereich verlassen wird.","Nie unter schwebenden Lasten aufhalten oder durchgehen."]},{"titel":"Stapeln im Regal","inhalt":["Das Ein- und Auslagern in Regale erfordert besondere Sorgfalt:","Regalf\u00e4cher auf Besch\u00e4digungen pr\u00fcfen \u2013 besch\u00e4digte Regale nicht benutzen und melden.","Zul\u00e4ssige Regal- und Fachlast beachten \u2013 nie \u00fcberschreiten.","Last beim Hochheben nah am Regal positionieren \u2013 seitliche Bewegungen in gro\u00dfer H\u00f6he vermeiden.","Beim Einlagern: Last erst ablegen wenn sie exakt positioniert ist.","Beim Auslagern: Last vollst\u00e4ndig von der Auflage abheben bevor r\u00fcckw\u00e4rts gefahren wird.","Bodenunebenheiten, Palettenf\u00fc\u00dfe und andere Hindernisse vor dem Einfahren pr\u00fcfen."]},{"titel":"Besondere Lasten","inhalt":["Nicht jede Last ist eine normale Palette \u2013 besondere Lasten erfordern besondere Ma\u00dfnahmen:","Langgut (Rohre, Profile): Geeignetes Anbauger\u00e4t verwenden, Last sichern, erh\u00f6hte Vorsicht beim Kurvenfahren.","Rundes oder rollneigendes Gut: Immer sichern, Antirutschmatten oder Keile verwenden.","Fl\u00fcssigkeitsbeh\u00e4lter: Langsam fahren, keine abrupten Bewegungen, Leckagen vermeiden.","Gefahrgut: Nur mit besonderer Schulung und Ausr\u00fcstung, Sicherheitsdatenbl\u00e4tter beachten.","Sperrige Lasten: Sichtbehinderung beachten, ggf. Einweiser einsetzen."]},{"titel":"Personentransport \u2013 verboten!","inhalt":["Das Bef\u00f6rdern von Personen auf Gabelzinken, Lasttr\u00e4gern oder anderen nicht daf\u00fcr vorgesehenen Teilen ist grunds\u00e4tzlich verboten.","Ausnahme: Nur mit einem speziell zugelassenen und gesicherten Personenaufnahmemittel (Arbeitskorb) d\u00fcrfen Personen angehoben werden \u2013 und nur wenn keine andere M\u00f6glichkeit besteht.","Der Arbeitskorb muss am Gabeltr\u00e4ger gesichert sein, der Fahrer darf den Stapler nicht verlassen.","Mitfahren auf dem Stapler (z.B. auf dem Gegengewicht) ist ebenfalls verboten."]}],"Verkehrsregeln":[{"titel":"Innerbetriebliche Verkehrsregeln","inhalt":["Im Betrieb gelten spezielle Verkehrsregeln, die der Unternehmer in der Betriebsanweisung festlegen muss:","Fahrwege und Fu\u00dfg\u00e4ngerbereiche m\u00fcssen klar getrennt und gekennzeichnet sein.","Vorfahrtsregelungen, Geschwindigkeitsbegrenzungen und Halteverbote sind einzuhalten.","An Kreuzungen, Kurven und engen Durchfahrten ist besondere Vorsicht geboten.","Fu\u00dfg\u00e4nger haben grunds\u00e4tzlich Vorrang \u2013 im Zweifelsfall immer anhalten und Blickkontakt herstellen.","Bei eingeschr\u00e4nkter Sicht (z.B. durch die Last): R\u00fcckw\u00e4rts fahren oder Einweiser einsetzen."]},{"titel":"Geschwindigkeit und Sicherheitsabst\u00e4nde","inhalt":["Die Fahrgeschwindigkeit muss immer der Situation angepasst werden \u2013 Schrittgeschwindigkeit in bestimmten Bereichen ist Pflicht:","In Fu\u00dfg\u00e4ngerbereichen, engen Durchfahrten, an Toren und \u00dcberg\u00e4ngen: Schrittgeschwindigkeit (max. 5\u20137 km/h).","Sicherheitsabstand zum vorausfahrenden Fahrzeug: Mindestens der dreifache Bremsweg.","Niemals dicht hinter anderen Staplern oder Fahrzeugen herfahren.","Nasse, \u00f6lige oder unebene B\u00f6den erfordern deutlich reduzierte Geschwindigkeit.","Auf Rampen und Gef\u00e4llestrecken: Kriechgeschwindigkeit, Last immer bergseitig."]},{"titel":"Sicht und Beleuchtung","inhalt":["Der Fahrer muss jederzeit ausreichende Sicht haben:","Bei Last im Fahrtrichtung: Nur wenn Sicht \u00fcber oder seitlich der Last m\u00f6glich ist.","Bei eingeschr\u00e4nkter Sicht durch die Last: R\u00fcckw\u00e4rts fahren (Last hinten) oder Einweiser einsetzen.","In schlecht beleuchteten Bereichen: Fahrzeugbeleuchtung einschalten.","Spiegel und R\u00fcckspiegel am Fahrzeug m\u00fcssen sauber und korrekt eingestellt sein.","Blendung durch Sonnenlicht oder k\u00fcnstliche Beleuchtung: Geschwindigkeit reduzieren."]},{"titel":"Verhalten an besonderen Stellen","inhalt":["An bestimmten Stellen im Betrieb gelten besondere Verhaltensregeln:","Tore und T\u00fcren: Nur ge\u00f6ffnet durchfahren, niemals versuchen Tore mit dem Stapler zu \u00f6ffnen.","Aufz\u00fcge: Nur benutzen wenn ausdr\u00fccklich f\u00fcr Stapler zugelassen, Zulassung und Tragf\u00e4higkeit pr\u00fcfen.","Laderampen und Lkw: Festigkeit und Tragf\u00e4higkeit pr\u00fcfen, Fahrzeug gesichert (unterkeilt), Rampe arretiert.","Kurven: Immer weit ausfahren, Geschwindigkeit deutlich reduzieren.","Kreuzungen: Immer bis zur Sichtlinie vorfahren, Hupe benutzen."]},{"titel":"Parken und Abstellen","inhalt":["Auch das Abstellen des Staplers ist geregelt:","Stapler nur auf daf\u00fcr vorgesehenen Stellpl\u00e4tzen abstellen.","Gabeln vollst\u00e4ndig absenken \u2013 nie mit angehobenen Gabeln abstellen (Unfallgefahr f\u00fcr Fu\u00dfg\u00e4nger).","Feststellbremse anziehen, beim Abstellen am Gef\u00e4lle zus\u00e4tzlich unterkeilen.","Motor abstellen, Z\u00fcndschl\u00fcssel abziehen (Unbefugter Gebrauch verhindern).","Nicht in Fluchtwegen, vor Feuerl\u00f6schern oder Notausg\u00e4ngen parken.","Bei l\u00e4ngeren Pausen: Fahrzeug vollst\u00e4ndig sichern."]}],"Betrieb allgemein":[{"titel":"T\u00e4gliche Pr\u00fcfung vor Arbeitsbeginn","inhalt":["Vor jeder Schicht ist der Fahrer verpflichtet, das Fahrzeug auf offensichtliche M\u00e4ngel zu pr\u00fcfen (\u00a7 4 DGUV Vorschrift 68):","Reifenzustand: Luftdruck (bei Luftreifen), Profiltiefe, Besch\u00e4digungen.","Gabeln: Risse, Verformungen, Verriegelung, gleichm\u00e4\u00dfige H\u00f6he.","Hubketten: Schmierung, Besch\u00e4digungen, Dehnung.","Hydraulik: \u00d6lstand, Leckagen an Schl\u00e4uchen und Zylindern.","Bremsen: Funktion Betriebs- und Feststellbremse.","Beleuchtung, Hupe, Spiegel, Sicherheitsgurt.","Kraft-/Ladezustand: Ausreichend Kraftstoff oder Ladezustand der Batterie."]},{"titel":"M\u00e4ngel erkennen und melden","inhalt":["Stellt der Fahrer M\u00e4ngel fest, muss er sofort handeln:","M\u00e4ngel sofort dem Vorgesetzten melden \u2013 schriftlich im Fahrtenbuch oder M\u00e4ngelprotokoll dokumentieren.","Bei sicherheitsrelevanten M\u00e4ngeln (z.B. defekte Bremsen, besch\u00e4digte Gabeln): Fahrzeug sofort stilllegen und kennzeichnen.","Das Fahrzeug erst wieder in Betrieb nehmen wenn der Mangel behoben und best\u00e4tigt wurde.","Keine Eigenreparaturen an sicherheitsrelevanten Bauteilen.","Der Fahrer haftet nicht f\u00fcr Sch\u00e4den die er korrekt gemeldet hat \u2013 er haftet aber wenn er mit einem bekannten Mangel weiterf\u00e4hrt."]},{"titel":"Schutzausr\u00fcstung und Schutzeinrichtungen","inhalt":["Pers\u00f6nliche Schutzausr\u00fcstung (PSA) ist im Staplerbereich vorgeschrieben:","Sicherheitsschuhe (mindestens S2/S3) sch\u00fctzen vor herabfallenden Lasten und \u00dcberfahren.","Warnweste erh\u00f6ht die Sichtbarkeit im Mischverkehr.","Je nach Betrieb: Schutzhelm, Geh\u00f6rschutz, Schutzhandschuhe.","Sicherheitsgurt am Stapler: Im Fahrersitz angurten, Gurt muss einwandfrei funktionieren.","Fahrerschutzdach (Overhead Guard): Sch\u00fctzt vor herabfallenden Teilen \u2013 darf nicht entfernt oder ver\u00e4ndert werden."]},{"titel":"Wiederkehrende Pr\u00fcfungen","inhalt":["Neben der t\u00e4glichen Sichtpr\u00fcfung durch den Fahrer muss der Unternehmer regelm\u00e4\u00dfige Pr\u00fcfungen veranlassen:","J\u00e4hrliche Pr\u00fcfung durch eine bef\u00e4higte Person (fr\u00fcher: Sachkundiger) nach BetrSichV und DGUV Vorschrift 68.","Die bef\u00e4higte Person pr\u00fcft alle sicherheitsrelevanten Bauteile und dokumentiert das Ergebnis im Pr\u00fcfbuch.","Das Pr\u00fcfbuch muss am Fahrzeug mitgef\u00fchrt werden.","Nach Unf\u00e4llen oder au\u00dfergew\u00f6hnlichen Ereignissen: Au\u00dferordentliche Pr\u00fcfung erforderlich.","Pr\u00fcfplakette am Fahrzeug zeigt F\u00e4lligkeitsdatum der n\u00e4chsten Pr\u00fcfung."]},{"titel":"Verhalten bei Unf\u00e4llen","inhalt":["Ereignet sich ein Unfall, muss der Fahrer sofort und richtig reagieren:","Sofort anhalten, Fahrzeug sichern (Feststellbremse, Motor aus).","Verletzte Personen: Erste Hilfe leisten, Notruf absetzen (112), Ersthelfer verst\u00e4ndigen.","Unfallstelle sichern \u2013 weitere Gef\u00e4hrdungen verhindern.","Vorgesetzten und ggf. Sicherheitsbeauftragten informieren.","Unfallhergang dokumentieren \u2013 Zeugen notieren.","Unf\u00e4lle m\u00fcssen der Berufsgenossenschaft gemeldet werden (bei Arbeitsunf\u00e4llen mit mehr als 3 Tagen Arbeitsunf\u00e4higkeit).","Fahrzeug nicht bewegen bis Ursache gekl\u00e4rt \u2013 au\u00dfer zur Rettung von Verletzten."]}],"Unfallgeschehen":[{"titel":"Unfallursachen beim Gabelstapler","inhalt":["Gabelstapler geh\u00f6ren zu den gef\u00e4hrlichsten Arbeitsmitteln im innerbetrieblichen Transport. Die h\u00e4ufigsten Unfallursachen:","\u00dcberschreiten der zul\u00e4ssigen Traglast oder des Lastschwerpunktabstands.","Zu hohe Geschwindigkeit \u2013 besonders in Kurven, auf Rampen oder in Mischverkehrsbereichen.","Unzureichende Sicht \u2013 Sichtbehinderung durch Last, schlechte Beleuchtung oder fehlende Spiegel.","Menschliches Fehlverhalten: Ablenkung, \u00dcberm\u00fcdung, Zeitdruck, fehlende Ausbildung.","Technische M\u00e4ngel: Defekte Bremsen, verschlissene Reifen, besch\u00e4digte Gabeln.","Organisatorische M\u00e4ngel: Fehlende Verkehrsregelung, unklare Zust\u00e4ndigkeiten."]},{"titel":"Typische Unfallszenarien","inhalt":["Die h\u00e4ufigsten Unfalltypen beim Staplerbetrieb:","\u00dcberfahren von Fu\u00dfg\u00e4ngern \u2013 oft an Kreuzungen, Toren oder in schlecht einsehbaren Bereichen.","Kippen des Staplers \u2013 durch \u00dcberlastung, zu schnelle Kurvenfahrt oder Querfahrt auf Schr\u00e4gen.","Herabfallen von Lasten \u2013 durch falsche Lastaufnahme, \u00dcberlastung oder fehlende Lastsicherung.","Anfahren von Regalen oder Bauteilen \u2013 durch unzureichende Abst\u00e4nde oder Unaufmerksamkeit.","Absturz von Laderampen \u2013 durch fehlende Sicherung des Lkw oder nicht arretierte Rampe.","Quetschungen durch den Stapler selbst \u2013 beim Ein- und Aussteigen oder unter dem Mast."]},{"titel":"Schutzma\u00dfnahmen gegen Unf\u00e4lle","inhalt":["Unf\u00e4lle lassen sich durch konsequente Schutzma\u00dfnahmen verhindern \u2013 gegliedert nach der STOP-Hierarchie:","Substitution: Gef\u00e4hrliche Arbeitsmittel durch sicherere ersetzen (z.B. automatische F\u00f6rdersysteme).","Technische Ma\u00dfnahmen: Getrennte Wege f\u00fcr Stapler und Fu\u00dfg\u00e4nger, Geschwindigkeitsbegrenzungen, Ampeln, Spiegel an un\u00fcbersichtlichen Stellen.","Organisatorische Ma\u00dfnahmen: Klare Verkehrsregeln, Betriebsanweisungen, Unterweisungen, Zugangsregelungen.","Pers\u00f6nliche Schutzma\u00dfnahmen: PSA tragen (Sicherheitsschuhe, Warnweste), Sicherheitsgurt anlegen.","Die Wirksamkeit nimmt von oben nach unten ab \u2013 technische Ma\u00dfnahmen sind immer wirksamer als Verhaltensregeln."]},{"titel":"Statistik und Bedeutung","inhalt":["Unf\u00e4lle mit Flurf\u00f6rderzeugen haben erhebliche Konsequenzen:","J\u00e4hrlich ereignen sich in Deutschland mehrere tausend meldepflichtige Arbeitsunf\u00e4lle mit Flurf\u00f6rderzeugen.","Ein erheblicher Anteil davon endet t\u00f6dlich oder mit dauerhafter Behinderung.","Die volkswirtschaftlichen Kosten (Ausfallzeiten, Behandlungskosten, Sachsch\u00e4den) sind enorm.","Studien zeigen: \u00dcber 80 % aller Stapelunf\u00e4lle w\u00e4ren durch korrektes Verhalten vermeidbar gewesen.","Deshalb ist eine fundierte Ausbildung nach DGUV Grundsatz 308-001 so wichtig \u2013 sie rettet Leben."]}],"Sondereins\u00e4tze":[{"titel":"Einsatz im Freien","inhalt":["Gabelstapler werden nicht nur in Hallen, sondern auch im Au\u00dfenbereich eingesetzt. Besondere Anforderungen:","Untergrund: Au\u00dfengel\u00e4nde ist oft uneben, nass, verschmutzt oder vereist \u2013 Geschwindigkeit anpassen, Reifendruck pr\u00fcfen.","Witterung: Bei starkem Wind Vorsicht mit gro\u00dffl\u00e4chigen Lasten (Windangriffsfl\u00e4che), bei Eis und Schnee stark reduzierte Haftung.","Sicht: Blendung durch Sonne beachten, ggf. Sonnenblende nutzen.","Nur f\u00fcr Au\u00dfeneinsatz zugelassene Stapler verwenden (Wetterschutz, geeignete Bereifung).","Erdreich-Tragf\u00e4higkeit pr\u00fcfen \u2013 weicher Boden kann unter der Last nachgeben."]},{"titel":"Einsatz im K\u00fchlhaus","inhalt":["Der Einsatz in Tiefk\u00fchlbereichen stellt besondere Anforderungen an Mensch und Maschine:","F\u00fcr K\u00e4lteeinsatz zugelassene Fahrzeuge verwenden (K\u00e4ltefest-Hydraulik\u00f6l, spezielle Bereifung, Heizung im Fahrerbereich).","Kondensation beim \u00dcbergang von warm zu kalt \u2013 Bremsen und Hubeinrichtung k\u00f6nnen kurzzeitig eingeschr\u00e4nkt sein.","Pers\u00f6nliche Schutzausr\u00fcstung: K\u00e4lteschutzkleidung, isolierte Sicherheitsschuhe, Handschuhe.","Aufenthaltszeiten begrenzen, Pausen in temperierten Bereichen einplanen.","Batterieleistung bei K\u00e4lte deutlich reduziert \u2013 h\u00e4ufigeres Laden oder Batteriewechsel einplanen."]},{"titel":"Einsatz auf Lkw und Laderampen","inhalt":["Das Be- und Entladen von Lkw geh\u00f6rt zum Alltag \u2013 und birgt erh\u00f6hte Unfallgefahren:","Lkw muss gesichert sein: Unterlegkeile, Feststellbremse, Motor aus.","\u00dcberfahrbr\u00fccke/Rampenplatte muss sicher arretiert und f\u00fcr die Last zugelassen sein.","Tragf\u00e4higkeit der Lkw-Ladefl\u00e4che pr\u00fcfen \u2013 nicht \u00fcberschreiten.","Im Lkw-Aufbau: Begrenzte H\u00f6he beachten, langsam und vorsichtig fahren.","Kommunikation mit dem Lkw-Fahrer sicherstellen \u2013 Fahrer darf das Fahrzeug nicht bewegen w\u00e4hrend geladen wird.","Nie \u00fcber die Lade\u00f6ffnung hinausfahren \u2013 Absturzgefahr."]},{"titel":"Einsatz mit Anbauger\u00e4ten","inhalt":["Anbauger\u00e4te erweitern die M\u00f6glichkeiten des Staplers erheblich \u2013 erfordern aber besondere Kenntnisse:","Vor dem Einsatz eines Anbauger\u00e4ts: Einweisung durch den Vorgesetzten oder Hersteller.","Ge\u00e4ndertes Traglastdiagramm am Fahrzeug anbringen und beachten.","Anbauger\u00e4te m\u00fcssen sicher am Gabeltr\u00e4ger befestigt sein \u2013 vor Arbeitsbeginn pr\u00fcfen.","Ver\u00e4nderte Fahreigenschaften ber\u00fccksichtigen: Gr\u00f6\u00dfere Gesamtl\u00e4nge, ver\u00e4nderte Sicht, anderes Fahrverhalten.","Anbauger\u00e4te regelm\u00e4\u00dfig warten und pr\u00fcfen lassen."]},{"titel":"Einsatz in Ex-Schutzzonen","inhalt":["In Bereichen mit explosionsgef\u00e4hrlichen Atmosph\u00e4ren (Ex-Zonen) d\u00fcrfen nur zugelassene Fahrzeuge eingesetzt werden:","Ex-Schutz-Zonen sind gekennzeichnet \u2013 der Einsatz von Standardstaplern ist dort verboten.","Nur eigensichere oder druckfeste Fahrzeuge (EX-gekennzeichnet) d\u00fcrfen in Ex-Zonen fahren.","Elektrostapler haben im Allgemeinen ein geringeres Z\u00fcndriskio als Verbrennungsstapler \u2013 aber auch sie m\u00fcssen f\u00fcr Ex-Zonen zertifiziert sein.","Vor dem Einsatz in Ex-Zonen: Absprache mit dem Sicherheitsbeauftragten und Pr\u00fcfung der Fahrzeugzulassung.","Regelm\u00e4\u00dfige Pr\u00fcfung der Ex-Schutz-Eignung durch bef\u00e4higte Person."]}]};

var bdir=BDIR[lernModul]||lernModul.replace(/ /g,"_");
var bildDiv=document.getElementById("k-bild");var bildImg=document.getElementById("k-img");
if(s.bilder&&s.bilder.length>0){bildImg.src=BILDER_PFAD+bdir+"/"+s.bilder[0];bildImg.onerror=function(){bildDiv.style.display="none"};bildDiv.style.display="flex"}else{bildDiv.style.display="none"}
var pct=Math.round(((lernIdx+1)/seiten.length)*100);
document.getElementById('lern-progress-bar').style.width=pct+'%';
document.getElementById('lern-progress-text').textContent=(lernIdx+1)+'/'+seiten.length;
document.getElementById('lern-weiter-btn').textContent=lernIdx===seiten.length-1?'Modul abschlie\u00dfen ✓':'Weiter →';
var dots=document.getElementById("lern-dots");dots.innerHTML="";
seiten.forEach(function(x,i){var d=document.createElement("span");d.className="lern-dot"+(i===lernIdx?" active":i<lernIdx?" done":"");d.onclick=function(){lernIdx=i;renderSeite()};dots.appendChild(d)});
}
function lernNext(){var s=MODULE[lernModul];if(lernIdx<s.length-1){lernIdx++;renderSeite()}else{showView('start')}}
function lernPrev(){if(lernIdx>0){lernIdx--;renderSeite()}}
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('active')}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function startQuiz(n){
letzteAnzahl=n;
qFragen=shuffle(FRAGEN).slice(0,n);qIdx=0;qRichtig=0;qGesamt=0;beantwortet=false;
document.getElementById('ergebnis').style.display='none';
document.getElementById('frage-box').style.display='';
document.getElementById('antworten').style.display='';
document.getElementById('feedback').style.display='';
document.getElementById('quiz-badge').textContent=n+' Fragen';
showView('quiz');renderFrage();
}
function renderFrage(){
beantwortet=false;
var q=qFragen[qIdx];
document.getElementById('frage-nr').textContent='Frage '+(qIdx+1)+' von '+qFragen.length;
document.getElementById('frage-text').textContent=q.f;
document.getElementById('quiz-score').textContent=qRichtig+' / '+qGesamt+' richtig';
document.getElementById('feedback').className='feedback-box';
document.getElementById('feedback').style.display='';
document.getElementById('weiter-btn').style.display='none';
var list=document.getElementById('antworten');list.innerHTML='';
var labels=['A','B','C','D'];
q.a.forEach(function(a,i){var btn=document.createElement("button");btn.className="antwort-btn";btn.innerHTML='<span class="antwort-label">'+labels[i]+'</span><span>'+a+'</span>';btn.onclick=function(){antworten(i,q.r)};list.appendChild(btn)});
}
function antworten(idx,ri){
if(beantwortet)return;beantwortet=true;qGesamt++;
var btns=document.querySelectorAll('.antwort-btn');
btns.forEach(function(b,i){b.classList.add("disabled");if(i===ri)b.classList.add("correct");if(i===idx&&idx!==ri)b.classList.add("wrong")});
var fb=document.getElementById("feedback");
if(idx===ri){qRichtig++;fb.textContent="\u2713 Richtig!";fb.className="feedback-box active"}
else{fb.textContent="\u2717 Falsch. Richtig w\u00e4re: \""+qFragen[qIdx].a[ri]+"\"";fb.className="feedback-box wrong active"}
document.getElementById('quiz-score').textContent=qRichtig+' / '+qGesamt+' richtig';
document.getElementById('weiter-btn').style.display='';
}
function naechste(){qIdx++;if(qIdx>=qFragen.length){ergebnis()}else{renderFrage()}}
function ergebnis(){
document.getElementById('frage-box').style.display='none';
document.getElementById('antworten').style.display='none';
document.getElementById('feedback').style.display='none';
document.getElementById('weiter-btn').style.display='none';
var pct=Math.round((qRichtig/qGesamt)*100);
document.getElementById('erg-pkt').textContent=pct+' %';
document.getElementById('erg-sub').textContent=qRichtig+' von '+qGesamt+' Fragen richtig';
document.getElementById('erg-hint').textContent=pct>=70?'\u2713 Bestanden (\u2265 70 %)':'\u2717 Nicht bestanden (< 70 %)';
var bar=document.getElementById('erg-bar');bar.style.width='0%';
bar.style.background=pct>=70?'linear-gradient(90deg,#4caf7d,#81e0a8)':'linear-gradient(90deg,#e05c5c,#ff8a65)';
setTimeout(function(){bar.style.width=pct+'%'},100);
document.getElementById('ergebnis').style.display='';
}
renderGrid();
</script></body></html>
