var lang="de",qF=[],qI=0,qR=0,qG=0,dn=false,lastN=20;

// Antworten mischen und richtige Position neu berechnen
function prepQ(q){
  var richtigText=q.a[q.r];
  var antworten=q.a.slice();
  // Fisher-Yates mischen
  for(var i=antworten.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=antworten[i];antworten[i]=antworten[j];antworten[j]=t;
  }
  return {f:q.f, a:antworten, r:antworten.indexOf(richtigText)};
}

function T(k){return(UI[lang]&&UI[lang][k])||UI.de[k]||k}
function setL(el,l){lang=l;document.querySelectorAll(".lb").forEach(function(b){b.classList.remove("act")});el.classList.add("act");uiUp()}
function showV(id){document.querySelectorAll(".view").forEach(function(v){v.classList.remove("active")});document.getElementById("v"+id).classList.add("active")}
function uiUp(){
  document.getElementById("hd").textContent=T("title");
  document.getElementById("hs").textContent=T("sub");
  document.getElementById("nb-ov").textContent=T("overview");
  var n=(F[lang]||F.de).length;
  document.getElementById("hp").textContent=n+" "+T("questions");
  document.getElementById("c20").textContent="20 "+T("questions");
  document.getElementById("c50").textContent="50 "+T("questions");
  document.getElementById("c186").textContent="186 "+T("questions");
  document.getElementById("qab").textContent=T("abort");
  document.getElementById("qend").textContent=T("cancel");
  document.getElementById("etit").textContent=T("result");
  document.getElementById("eag").textContent=T("again");
  document.getElementById("eov").textContent=T("toOv");
}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function go(n){
  lastN=n;var src=F[lang]||F.de;
  qF=shuffle(src).slice(0,n);qI=0;qR=0;qG=0;dn=false;
  document.getElementById("erg").style.display="none";
  document.getElementById("fbox").style.display="";
  document.getElementById("alist").style.display="";
  document.getElementById("fb").className="fb";
  document.getElementById("qb").textContent=n+" "+T("questions");
  showV("q");rF();
}
function rF(){
  dn=false;
  // Antworten hier mischen!
  var q=prepQ(qF[qI]);
  document.getElementById("fnr").textContent=T("qof")+" "+(qI+1)+" "+T("of")+" "+qF.length;
  document.getElementById("ftxt").textContent=q.f;
  document.getElementById("qsc").textContent=qR+" / "+qG+" "+T("right");
  document.getElementById("pb").style.width=Math.round((qI/qF.length)*100)+"%";
  document.getElementById("fb").className="fb";
  document.getElementById("qnxt").style.display="none";
  var list=document.getElementById("alist");list.innerHTML="";
  var L=["A","B","C","D"];
  q.a.forEach(function(a,i){
    var btn=document.createElement("button");btn.className="abtn";
    btn.innerHTML='<span class="al">'+L[i]+'</span><span>'+a+'</span>';
    btn.onclick=(function(idx,ri){return function(){ans(idx,ri)};})(i,q.r);
    list.appendChild(btn);
  });
}
function ans(idx,ri){
  if(dn)return;dn=true;qG++;
  document.querySelectorAll(".abtn").forEach(function(b,i){b.classList.add("dis");if(i===ri)b.classList.add("ok");if(i===idx&&idx!==ri)b.classList.add("ng")});
  var fb=document.getElementById("fb");
  var richtigText=document.querySelectorAll(".abtn")[ri].querySelector("span:last-child").textContent;
  if(idx===ri){qR++;fb.textContent=T("correct");fb.className="fb show"}
  else{fb.textContent=T("wrong")+' "'+richtigText+'"';fb.className="fb ng show"}
  document.getElementById("qsc").textContent=qR+" / "+qG+" "+T("right");
  document.getElementById("qnxt").textContent=T("next");
  document.getElementById("qnxt").style.display="";
}
function nxt(){qI++;if(qI>=qF.length)showErg();else rF()}
function showErg(){
  document.getElementById("fbox").style.display="none";
  document.getElementById("alist").style.display="none";
  document.getElementById("fb").className="fb";
  document.getElementById("qnxt").style.display="none";
  document.getElementById("pb").style.width="100%";
  var pct=Math.round((qR/qG)*100);
  document.getElementById("epkt").textContent=pct+" %";
  document.getElementById("esub").textContent=qR+" "+T("of")+" "+qG+" "+T("right");
  document.getElementById("ehi").textContent=pct>=70?T("passed"):T("failed");
  var b=document.getElementById("ebf");b.style.width="0%";
  b.style.background=pct>=70?"linear-gradient(90deg,#4caf7d,#81e0a8)":"linear-gradient(90deg,#e05c5c,#ff8a65)";
  setTimeout(function(){b.style.width=pct+"%"},100);
  document.getElementById("erg").style.display="";
}
uiUp();
